name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current 8.x prerelease to the next npm dist tag
        required: true
        type: choice
        options:
          - next
        default: next

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify prerelease branch
        if: github.event_name == 'workflow_dispatch' && github.ref_name != '8.x'
        run: |
          echo "Prereleases must be published from the 8.x branch."
          exit 1

      - name: Verify release prerequisites
        run: npm run prepublishOnly

      - name: Create release PR or publish
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          commit: 'chore: release packages'
          title: 'chore: release packages'
          version: npm run changeset:version
          publish: npm run release:publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Verify next prerelease state
        if: github.event_name == 'workflow_dispatch'
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const preJson = JSON.parse(fs.readFileSync('.changeset/pre.json', 'utf8'));

          if (preJson.mode !== 'pre' || preJson.tag !== 'next') {
            throw new Error('Expected Changesets prerelease mode with the next tag.');
          }

          if (!packageJson.version.includes('-next.')) {
            throw new Error('Expected package version to be a next prerelease.');
          }
          EOF

      - name: Publish prerelease to next
        if: github.event_name == 'workflow_dispatch'
        run: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push prerelease tags
        if: github.event_name == 'workflow_dispatch'
        run: git push --follow-tags
